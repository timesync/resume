<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1c1c1c"/>

  <!-- Border -->
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#c45c2e" stroke-width="1" opacity="0.4"/>

  <!-- KC monogram — top left -->
  <rect x="80" y="80" width="52" height="52" rx="5" fill="#c45c2e"/>
  <text x="106" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="bold" fill="#faf8f5" text-anchor="middle">KC</text>

  <!-- Name -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="88" font-weight="normal" fill="#faf8f5" letter-spacing="-2">Kurt Collins</text>

  <!-- Accent line -->
  <rect x="80" y="338" width="120" height="2" fill="#c45c2e"/>

  <!-- Tagline -->
  <text x="80" y="392" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" fill="#888888">Founder · Engineer · Chief of Staff</text>

  <!-- URL — bottom right -->
  <text x="1120" y="572" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="18" fill="#888888" text-anchor="end" letter-spacing="0.05em">resume.collins.gd</text>
</svg>
